<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TikLike · Alertas</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: transparent; overflow: hidden; }
  body { font-family: "Segoe UI", system-ui, sans-serif; display: flex; align-items: center; justify-content: center; }
  #alert {
    display: none; align-items: center; gap: 18px;
    padding: 22px 34px; border-radius: 22px; color: #fff;
    background: linear-gradient(135deg, #ff2d7e, #7b2ff7);
    box-shadow: 0 12px 40px rgba(0,0,0,.45);
    min-width: 420px; max-width: 80vw;
  }
  #alert.show { display: flex; animation: pop .5s cubic-bezier(.2,1.3,.4,1) both; }
  #alert.hide { animation: out .45s ease forwards; }
  .icon {
    width: 84px; height: 84px; border-radius: 50%; flex: 0 0 auto;
    background: rgba(255,255,255,.18) center/64px no-repeat; display: grid; place-items: center;
    font-size: 44px; border: 3px solid rgba(255,255,255,.5);
    background-size: cover;
  }
  .txt { line-height: 1.2; }
  .who { font-size: 30px; font-weight: 800; text-shadow: 0 2px 6px rgba(0,0,0,.35); }
  .what { font-size: 20px; opacity: .95; margin-top: 4px; }
  .big { font-size: 24px; font-weight: 800; }
  @keyframes pop { from { opacity: 0; transform: scale(.7) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  @keyframes out { to { opacity: 0; transform: scale(.95) translateY(-14px); } }
</style>
</head>
<body>
<div id="alert">
  <div class="icon" id="al-icon">🎁</div>
  <div class="txt">
    <div class="who" id="al-who"></div>
    <div class="what" id="al-what"></div>
  </div>
</div>
<script src="/assets/tiklike.js"></script>
<script>
  const box = document.getElementById('alert');
  const elIcon = document.getElementById('al-icon');
  const elWho = document.getElementById('al-who');
  const elWhat = document.getElementById('al-what');

  const queue = [];
  let busy = false;

  function enqueue(a) { queue.push(a); pump(); }

  function pump() {
    if (busy || queue.length === 0) return;
    busy = true;
    const a = queue.shift();

    box.className = '';
    box.style.background = a.bg || 'linear-gradient(135deg, #ff2d7e, #7b2ff7)';
    if (a.pic) { elIcon.style.backgroundImage = `url('${a.pic}')`; elIcon.textContent = ''; }
    else { elIcon.style.backgroundImage = 'none'; elIcon.textContent = a.emoji || '🎉'; }
    elWho.textContent = a.who;
    elWhat.innerHTML = a.what;

    void box.offsetWidth;
    box.classList.add('show');

    setTimeout(() => {
      box.classList.remove('show');
      box.classList.add('hide');
      setTimeout(() => { box.style.display = 'none'; busy = false; pump(); }, 450);
    }, a.duration || 4500);
  }

  TikLike.connect((msg) => {
    if (msg.type === 'gift') {
      if (msg.streaking) return;
      enqueue({
        who: msg.user.name, pic: msg.user.pic, emoji: '🎁',
        what: `envió <span class="big">${msg.count}× ${TikLike.escapeHtml(msg.giftName)}</span> · 💎${msg.diamonds}`,
        bg: 'linear-gradient(135deg, #b829e8, #ff2d7e)',
      });
    } else if (msg.type === 'follow') {
      enqueue({
        who: msg.user.name, pic: msg.user.pic, emoji: '✨',
        what: '¡Nuevo seguidor!',
        bg: 'linear-gradient(135deg, #11998e, #38ef7d)', duration: 4000,
      });
    } else if (msg.type === 'share') {
      enqueue({
        who: msg.user.name, pic: msg.user.pic, emoji: '🔁',
        what: 'compartió el directo',
        bg: 'linear-gradient(135deg, #2b5876, #4e4376)', duration: 3500,
      });
    }
  });
</script>
</body>
</html>
