<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TikLike · Efectos</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; width: 100%; background: transparent; overflow: hidden; }
  body { font-family: "Segoe UI", system-ui, sans-serif; }
  #stage { position: fixed; inset: 0; pointer-events: none; }

  /* destello de pantalla para regalos grandes */
  #flash { position: fixed; inset: 0; opacity: 0; pointer-events: none;
    background: radial-gradient(circle at 50% 55%, rgba(255,45,126,.35), transparent 60%); }
  #flash.on { animation: flash 1s ease-out; }
  @keyframes flash { 0% { opacity: 0; } 20% { opacity: 1; } 100% { opacity: 0; } }

  /* icono de regalo que sube y se desvanece */
  .float { position: absolute; bottom: 8%; will-change: transform, opacity; }
  .float .gi { width: 64px; height: 64px; object-fit: contain; filter: drop-shadow(0 4px 10px rgba(0,0,0,.45)); }
  .float .glabel { position: absolute; bottom: -6px; right: -10px; background: linear-gradient(135deg,#ff2d7e,#b829e8);
    color: #fff; font-weight: 800; font-size: 13px; padding: 1px 7px; border-radius: 10px; box-shadow: 0 2px 6px rgba(0,0,0,.4); }
  @keyframes floatUp {
    0% { opacity: 0; transform: translateY(0) scale(.6); }
    12% { opacity: 1; transform: translateY(-30px) scale(1); }
    80% { opacity: 1; }
    100% { opacity: 0; transform: translateY(var(--rise,-520px)) translateX(var(--drift,0)) scale(1); }
  }

  /* corazón de tap-tap */
  .heart { position: absolute; bottom: 6%; font-size: 30px; will-change: transform, opacity; }
  @keyframes heartUp {
    0% { opacity: 0; transform: translateY(0) scale(.4); }
    15% { opacity: 1; transform: translateY(-20px) scale(1); }
    100% { opacity: 0; transform: translateY(var(--rise,-420px)) translateX(var(--drift,0)) scale(1.1) rotate(var(--rot,0deg)); }
  }

  /* celebración central de regalo grande */
  .burst { position: absolute; left: 50%; top: 48%; transform: translate(-50%,-50%); display: grid; place-items: center; }
  .burst .core { position: relative; display: grid; place-items: center; }
  .burst .bimg { width: 150px; height: 150px; object-fit: contain; filter: drop-shadow(0 0 22px rgba(255,45,126,.8)); animation: burstIn 2.6s cubic-bezier(.18,.9,.25,1) forwards; }
  .burst .btxt { position: absolute; bottom: -46px; white-space: nowrap; color: #fff; font-weight: 900; font-size: 22px;
    text-shadow: 0 2px 10px rgba(0,0,0,.6); animation: burstIn 2.6s ease forwards; }
  .burst .btxt b { color: #ffd86b; }
  @keyframes burstIn {
    0% { opacity: 0; transform: scale(.2) rotate(-12deg); }
    14% { opacity: 1; transform: scale(1.18) rotate(4deg); }
    24% { transform: scale(1) rotate(0); }
    78% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(1.05); }
  }
  .ring { position: absolute; border: 3px solid rgba(255,45,126,.7); border-radius: 50%; width: 120px; height: 120px;
    animation: ring 1.4s ease-out forwards; }
  @keyframes ring { 0% { opacity: .8; transform: scale(.4); } 100% { opacity: 0; transform: scale(2.6); } }
  .particle { position: absolute; font-size: 22px; will-change: transform, opacity; animation: particle 1.5s ease-out forwards; }
  @keyframes particle {
    0% { opacity: 0; transform: translate(0,0) scale(.4); }
    20% { opacity: 1; }
    100% { opacity: 0; transform: translate(var(--px,0), var(--py,0)) scale(1.1); }
  }
</style>
</head>
<body>
  <div id="flash"></div>
  <div id="stage"></div>
<script src="/assets/tiklike.js"></script>
<script>
  const stage = document.getElementById('stage');
  const flash = document.getElementById('flash');
  const W = () => window.innerWidth;

  const rnd = (a, b) => a + Math.random() * (b - a);
  function cap() { return stage.childElementCount < 60; } // límite de seguridad

  // --- icono de regalo subiendo ---
  function floatGift(ev) {
    if (!cap()) return;
    const wrap = document.createElement('div');
    wrap.className = 'float';
    wrap.style.left = rnd(8, 82) + '%';
    wrap.style.setProperty('--rise', '-' + rnd(380, 620).toFixed(0) + 'px');
    wrap.style.setProperty('--drift', rnd(-60, 60).toFixed(0) + 'px');
    const size = 48 + Math.min(60, (ev.diamonds || 0) / 4); // más grande si vale más
    const inner = ev.giftIcon
      ? `<img class="gi" src="${ev.giftIcon}" style="width:${size}px;height:${size}px" alt="">`
      : `<div class="gi" style="width:${size}px;height:${size}px;font-size:${size}px;line-height:1">🎁</div>`;
    const label = ev.count > 1 ? `<span class="glabel">x${ev.count}</span>` : '';
    wrap.innerHTML = inner + label;
    wrap.style.animation = `floatUp ${rnd(2.6, 3.6).toFixed(2)}s ease-out forwards`;
    stage.appendChild(wrap);
    setTimeout(() => wrap.remove(), 3800);
  }

  // --- corazón de tap-tap ---
  const HEARTS = ['❤️', '💖', '💗', '💓', '🩷', '🧡', '💛'];
  function floatHeart() {
    if (!cap()) return;
    const h = document.createElement('div');
    h.className = 'heart';
    h.textContent = HEARTS[Math.floor(Math.random() * HEARTS.length)];
    h.style.left = rnd(6, 92) + '%';
    h.style.setProperty('--rise', '-' + rnd(300, 480).toFixed(0) + 'px');
    h.style.setProperty('--drift', rnd(-50, 50).toFixed(0) + 'px');
    h.style.setProperty('--rot', rnd(-25, 25).toFixed(0) + 'deg');
    h.style.animation = `heartUp ${rnd(1.6, 2.6).toFixed(2)}s ease-out forwards`;
    stage.appendChild(h);
    setTimeout(() => h.remove(), 2700);
  }

  // --- celebración central para regalos grandes ---
  function burst(ev, epic) {
    const b = document.createElement('div');
    b.className = 'burst';
    const core = document.createElement('div');
    core.className = 'core';
    const img = ev.giftIcon
      ? `<img class="bimg" src="${ev.giftIcon}" alt="">`
      : `<div class="bimg" style="font-size:130px;line-height:1">🎁</div>`;
    core.innerHTML = img + `<div class="btxt"><b>${TikLike.escapeHtml(ev.user.name)}</b> · ${ev.count}× ${TikLike.escapeHtml(ev.giftName)} 💎${ev.diamonds}</div>`;

    // anillos
    const rings = epic ? 3 : 2;
    for (let i = 0; i < rings; i++) {
      const r = document.createElement('div');
      r.className = 'ring';
      r.style.animationDelay = (i * 0.18) + 's';
      core.appendChild(r);
    }
    // partículas
    const count = epic ? 18 : 10;
    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.textContent = epic ? HEARTS[i % HEARTS.length] : '✨';
      const ang = (Math.PI * 2 * i) / count + rnd(-0.3, 0.3);
      const dist = rnd(120, epic ? 320 : 220);
      p.style.setProperty('--px', (Math.cos(ang) * dist).toFixed(0) + 'px');
      p.style.setProperty('--py', (Math.sin(ang) * dist).toFixed(0) + 'px');
      p.style.animationDelay = rnd(0, 0.25).toFixed(2) + 's';
      core.appendChild(p);
    }
    b.appendChild(core);
    stage.appendChild(b);

    flash.classList.remove('on'); void flash.offsetWidth; flash.classList.add('on');
    setTimeout(() => b.remove(), 2800);
  }

  // --- throttle de tap-tap ---
  let lastHeart = 0;

  TikLike.connect((msg) => {
    if (msg.type === 'gift' && !msg.streaking) {
      const d = msg.diamonds || 0;
      if (d >= 100) burst(msg, d >= 1000);   // celebración central
      else floatGift(msg);                    // icono subiendo
    } else if (msg.type === 'like') {
      const now = performance.now();
      // un corazón por evento, como mucho cada ~120ms
      if (now - lastHeart > 120) { lastHeart = now; floatHeart(); }
    }
  });
</script>
</body>
</html>
