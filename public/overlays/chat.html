<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TikLike · Chat</title>
<style>
  :root { --bg: transparent; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); overflow: hidden; }
  body {
    font-family: "Segoe UI", system-ui, sans-serif;
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 16px; gap: 8px;
  }
  .row {
    display: flex; align-items: flex-start; gap: 10px;
    background: rgba(18, 18, 22, 0.72);
    border-radius: 14px; padding: 10px 14px;
    backdrop-filter: blur(6px);
    box-shadow: 0 4px 16px rgba(0,0,0,.3);
    animation: slideIn .28s ease both;
    max-width: 560px;
  }
  .row.gift { background: rgba(74, 33, 99, 0.78); }
  .row.follow { background: rgba(20, 78, 64, 0.78); }
  .row.join { background: rgba(30, 41, 70, 0.7); opacity: .92; }
  .row.join .name { color: #9fc2ff; }
  .avatar {
    width: 38px; height: 38px; border-radius: 50%; flex: 0 0 auto;
    background: #333 center/cover no-repeat; border: 2px solid rgba(255,255,255,.25);
  }
  .body { color: #fff; line-height: 1.35; word-break: break-word; }
  .name { font-weight: 700; font-size: 14px; color: #6ff0d0; margin-right: 6px; }
  .row.gift .name { color: #f7b8ff; }
  .row.follow .name { color: #8effc4; }
  .text { font-size: 15px; }
  .tag { font-size: 13px; opacity: .9; }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .gimg { width: 22px; height: 22px; vertical-align: middle; object-fit: contain; }
  .row.leaving { animation: fadeOut .4s ease forwards; }
  @keyframes fadeOut { to { opacity: 0; transform: translateX(-20px); } }
</style>
</head>
<body>
<div id="feed"></div>
<script src="/assets/tiklike.js"></script>
<script>
  const feed = document.getElementById('feed');
  const MAX = 14;

  function avatarStyle(pic) {
    return pic ? `background-image:url('${pic}')` : '';
  }

  function add(node) {
    feed.appendChild(node);
    while (feed.children.length > MAX) {
      const old = feed.firstElementChild;
      old.classList.add('leaving');
      setTimeout(() => old.remove(), 400);
      if (feed.children.length > MAX + 2) old.remove();
      break;
    }
  }

  function chatRow(ev) {
    const el = document.createElement('div');
    el.className = 'row';
    el.innerHTML = `
      <div class="avatar" style="${avatarStyle(ev.user.pic)}"></div>
      <div class="body"><span class="name">${TikLike.escapeHtml(ev.user.name)}</span><span class="text">${TikLike.escapeHtml(ev.comment)}</span></div>`;
    add(el);
  }

  function giftRow(ev) {
    if (ev.streaking) return; // mostramos el regalo al cerrarse la racha
    const el = document.createElement('div');
    el.className = 'row gift';
    const icon = ev.giftIcon ? `<img class="gimg" src="${ev.giftIcon}" alt="">` : '';
    el.innerHTML = `
      <div class="avatar" style="${avatarStyle(ev.user.pic)}"></div>
      <div class="body"><span class="name">${TikLike.escapeHtml(ev.user.name)}</span><span class="tag">envió ${ev.count}× ${TikLike.escapeHtml(ev.giftName)}</span> ${icon} <span class="tag">💎${ev.diamonds}</span></div>`;
    add(el);
  }

  function followRow(ev) {
    const el = document.createElement('div');
    el.className = 'row follow';
    el.innerHTML = `
      <div class="avatar" style="${avatarStyle(ev.user.pic)}"></div>
      <div class="body"><span class="name">${TikLike.escapeHtml(ev.user.name)}</span><span class="tag">empezó a seguirte ✨</span></div>`;
    add(el);
  }

  function joinRow(ev) {
    const el = document.createElement('div');
    el.className = 'row join';
    el.innerHTML = `
      <div class="avatar" style="${avatarStyle(ev.user.pic)}"></div>
      <div class="body"><span class="name">${TikLike.escapeHtml(ev.user.name)}</span><span class="tag">entró a la sala 👋</span></div>`;
    add(el);
  }

  TikLike.connect((msg) => {
    if (msg.type === 'chat') chatRow(msg);
    else if (msg.type === 'gift') giftRow(msg);
    else if (msg.type === 'follow') followRow(msg);
    else if (msg.type === 'member') joinRow(msg);
  });
</script>
</body>
</html>
