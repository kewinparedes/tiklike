<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TikLike · Voz (TTS)</title>
<style>
  * { box-sizing: border-box; }
  :root { --bg:#0e0e14; --card:#181822; --line:#2a2a38; --txt:#eef; --muted:#8a8aa0; --accent:#ff2d7e; --ok:#38ef7d; }
  body { margin:0; background:var(--bg); color:var(--txt); font-family:"Segoe UI",system-ui,sans-serif; }
  .wrap { max-width:620px; margin:0 auto; padding:24px 18px 50px; }
  h1 { font-size:22px; margin:0 0 4px; } h1 span { color:var(--accent); }
  .sub { color:var(--muted); font-size:13px; margin:0 0 20px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:18px; margin-bottom:16px; }
  .big {
    width:100%; border:0; border-radius:12px; padding:16px; font-size:18px; font-weight:800; cursor:pointer; color:#fff;
    background:var(--accent); transition:filter .15s;
  }
  .big:hover { filter:brightness(1.1); }
  .big.on { background:#24242f; }
  .big.on::before { content:"🔊 "; }
  .big.off::before { content:"🔇 "; }
  .status { display:flex; align-items:center; gap:10px; margin-top:12px; font-size:14px; color:var(--muted); }
  .dot { width:10px; height:10px; border-radius:50%; background:var(--muted); }
  .dot.on { background:var(--ok); box-shadow:0 0 8px var(--ok); }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  label.chk { display:flex; align-items:center; gap:8px; padding:8px 0; font-size:14px; cursor:pointer; }
  label.chk input { width:18px; height:18px; accent-color:var(--accent); }
  .field { margin:12px 0; }
  .field label { display:block; font-size:13px; color:var(--muted); margin-bottom:6px; }
  select, input[type=range], input[type=number] {
    width:100%; background:#11111a; border:1px solid var(--line); color:var(--txt); border-radius:9px; padding:9px 10px; font-size:14px;
  }
  input[type=range] { padding:0; }
  .rowflex { display:flex; gap:8px; align-items:center; }
  button.ghost { background:#24242f; color:#fff; border:0; border-radius:9px; padding:9px 14px; font-size:13px; cursor:pointer; }
  h2 { font-size:13px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin:0 0 10px; }
  .now { font-size:13px; color:var(--ok); min-height:18px; margin-top:8px; }
  .hint { font-size:12px; color:var(--muted); margin-top:6px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Tik<span>Like</span> · Voz</h1>
  <p class="sub">Lee el chat y los eventos en voz alta. Déjala abierta en una pestaña (o añádela como fuente de navegador en OBS).</p>

  <div class="card">
    <button id="toggle" class="big off">Activar voz</button>
    <div class="status"><span class="dot" id="dot"></span><span id="statusText">Voz desactivada</span><span id="queueInfo" style="margin-left:auto"></span></div>
    <div class="now" id="now"></div>
    <div class="hint">El navegador necesita que pulses "Activar voz" una vez para permitir el audio.</div>
  </div>

  <div class="card">
    <h2>Qué leer</h2>
    <div class="grid2">
      <label class="chk"><input type="checkbox" id="read_chat" checked> Chat</label>
      <label class="chk"><input type="checkbox" id="read_gift" checked> Regalos</label>
      <label class="chk"><input type="checkbox" id="read_follow" checked> Seguidores</label>
      <label class="chk"><input type="checkbox" id="read_share"> Compartidos</label>
      <label class="chk"><input type="checkbox" id="read_member"> Entradas</label>
      <label class="chk"><input type="checkbox" id="say_name" checked> Decir el nombre</label>
    </div>
  </div>

  <div class="card">
    <h2>Voz</h2>
    <div class="field">
      <label>Voz</label>
      <select id="voice"></select>
    </div>
    <div class="field">
      <label>Velocidad: <span id="rateVal">1.0</span></label>
      <input type="range" id="rate" min="0.5" max="1.8" step="0.1" value="1">
    </div>
    <div class="field">
      <label>Volumen: <span id="volVal">100%</span></label>
      <input type="range" id="vol" min="0" max="1" step="0.05" value="1">
    </div>
    <div class="rowflex">
      <button class="ghost" id="testBtn">Probar voz</button>
      <button class="ghost" id="clearBtn">Vaciar cola</button>
    </div>
  </div>

  <div class="card">
    <h2>Filtros</h2>
    <div class="field">
      <label>Longitud máxima de un mensaje (caracteres)</label>
      <input type="number" id="maxLen" min="20" max="500" value="180">
    </div>
    <label class="chk"><input type="checkbox" id="skipLinks" checked> Omitir mensajes con enlaces (http...)</label>
    <label class="chk"><input type="checkbox" id="skipCmds" checked> Omitir comandos (empiezan con "!" o "/")</label>
  </div>
</div>

<script src="/assets/tiklike.js"></script>
<script>
  const $ = (id) => document.getElementById(id);
  const synth = window.speechSynthesis;
  let enabled = false;
  let voices = [];
  let speaking = false;
  const queue = [];

  // ---- persistencia de ajustes ----
  const SETTINGS = ['read_chat','read_gift','read_follow','read_share','read_member','say_name','skipLinks','skipCmds'];
  const NUMS = ['rate','vol','maxLen'];
  function saveSettings() {
    const s = {};
    SETTINGS.forEach(id => s[id] = $(id).checked);
    NUMS.forEach(id => s[id] = $(id).value);
    s.voice = $('voice').value;
    localStorage.setItem('tiklike_tts', JSON.stringify(s));
  }
  function loadSettings() {
    let s; try { s = JSON.parse(localStorage.getItem('tiklike_tts')); } catch {}
    if (!s) return;
    SETTINGS.forEach(id => { if (id in s) $(id).checked = s[id]; });
    NUMS.forEach(id => { if (id in s) $(id).value = s[id]; });
    if (s.voice) $('voice').dataset.want = s.voice;
  }

  // ---- voces ----
  function loadVoices() {
    voices = synth.getVoices();
    const sel = $('voice');
    const want = sel.value || sel.dataset.want || '';
    sel.innerHTML = '';
    // Español primero
    const sorted = [...voices].sort((a, b) => {
      const ae = a.lang.toLowerCase().startsWith('es') ? 0 : 1;
      const be = b.lang.toLowerCase().startsWith('es') ? 0 : 1;
      return ae - be || a.name.localeCompare(b.name);
    });
    sorted.forEach(v => {
      const o = document.createElement('option');
      o.value = v.name; o.textContent = `${v.name} (${v.lang})`;
      sel.appendChild(o);
    });
    if (want && sorted.some(v => v.name === want)) sel.value = want;
    else { const es = sorted.find(v => v.lang.toLowerCase().startsWith('es')); if (es) sel.value = es.name; }
  }
  synth.onvoiceschanged = loadVoices;

  function currentVoice() { return voices.find(v => v.name === $('voice').value) || null; }

  // ---- cola de habla ----
  function speakNext() {
    if (!enabled || speaking || queue.length === 0) { updateStatus(); return; }
    speaking = true;
    const text = queue.shift();
    const u = new SpeechSynthesisUtterance(text);
    const v = currentVoice();
    if (v) { u.voice = v; u.lang = v.lang; }
    u.rate = parseFloat($('rate').value);
    u.volume = parseFloat($('vol').value);
    u.onend = u.onerror = () => { speaking = false; $('now').textContent = ''; speakNext(); };
    $('now').textContent = '🗣️ ' + text;
    synth.speak(u);
    updateStatus();
  }

  function enqueue(text) {
    if (!enabled) return;
    text = (text || '').trim();
    if (!text) return;
    queue.push(text);
    if (queue.length > 25) queue.splice(0, queue.length - 25); // descarta atraso
    speakNext();
  }

  function updateStatus() {
    $('queueInfo').textContent = queue.length ? `en cola: ${queue.length}` : '';
  }

  // ---- construir el texto a leer ----
  function clean(comment) {
    let t = String(comment || '');
    if ($('skipLinks').checked && /https?:\/\/|www\./i.test(t)) return null;
    if ($('skipCmds').checked && /^[!\/]/.test(t.trim())) return null;
    const max = parseInt($('maxLen').value, 10) || 180;
    if (t.length > max) t = t.slice(0, max);
    return t.trim() || null;
  }
  function withName(name, body) {
    return $('say_name').checked ? `${name} ${body}` : body;
  }

  TikLike.connect((msg) => {
    if (msg.type === 'chat' && $('read_chat').checked) {
      const c = clean(msg.comment);
      if (c) enqueue(withName(msg.user.name + ' dice:', c));
    } else if (msg.type === 'gift' && !msg.streaking && $('read_gift').checked) {
      enqueue(`${msg.user.name} envió ${msg.count} ${msg.giftName}`);
    } else if (msg.type === 'follow' && $('read_follow').checked) {
      enqueue(`${msg.user.name} empezó a seguirte`);
    } else if (msg.type === 'share' && $('read_share').checked) {
      enqueue(`${msg.user.name} compartió el directo`);
    } else if (msg.type === 'member' && $('read_member').checked) {
      enqueue(`${msg.user.name} entró`);
    } else if (msg.type === 'status') {
      $('statusText2') && null;
    }
  });

  // ---- controles ----
  $('toggle').onclick = () => {
    enabled = !enabled;
    const btn = $('toggle');
    btn.classList.toggle('on', enabled);
    btn.classList.toggle('off', !enabled);
    btn.textContent = enabled ? 'Voz activada (clic para silenciar)' : 'Activar voz';
    $('dot').classList.toggle('on', enabled);
    $('statusText').textContent = enabled ? 'Escuchando el directo…' : 'Voz desactivada';
    if (enabled) { synth.cancel(); enqueue('Voz activada'); }
    else { synth.cancel(); queue.length = 0; speaking = false; $('now').textContent = ''; updateStatus(); }
  };

  $('testBtn').onclick = () => {
    // también sirve como "gesto" para desbloquear el audio
    const u = new SpeechSynthesisUtterance('Hola, esta es una prueba de voz de TikLike');
    const v = currentVoice(); if (v) { u.voice = v; u.lang = v.lang; }
    u.rate = parseFloat($('rate').value); u.volume = parseFloat($('vol').value);
    synth.cancel(); synth.speak(u);
  };
  $('clearBtn').onclick = () => { synth.cancel(); queue.length = 0; speaking = false; $('now').textContent = ''; updateStatus(); };

  $('rate').oninput = () => { $('rateVal').textContent = parseFloat($('rate').value).toFixed(1); saveSettings(); };
  $('vol').oninput = () => { $('volVal').textContent = Math.round($('vol').value * 100) + '%'; saveSettings(); };
  [...SETTINGS, 'voice', 'maxLen'].forEach(id => $(id).addEventListener('change', saveSettings));

  // init
  loadSettings();
  loadVoices();
  $('rateVal').textContent = parseFloat($('rate').value).toFixed(1);
  $('volVal').textContent = Math.round($('vol').value * 100) + '%';
</script>
</body>
</html>
