<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TikLike · Top</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: transparent; overflow: hidden; }
  body { font-family: "Segoe UI", system-ui, sans-serif; padding: 16px; }
  .panel {
    width: 320px; background: rgba(18,18,22,.78); backdrop-filter: blur(8px);
    border-radius: 18px; padding: 14px 16px; color: #fff; box-shadow: 0 8px 28px rgba(0,0,0,.35);
  }
  .head { display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 16px; margin-bottom: 12px; position: relative; }
  .head .ic { font-size: 20px; display: inline-block; transform-origin: center; position: relative; z-index: 1; }
  .head .ic.beat { animation: beat .55s ease; }
  @keyframes beat {
    0% { transform: scale(1); }
    20% { transform: scale(1.4); }
    40% { transform: scale(1.05); }
    60% { transform: scale(1.28); }
    100% { transform: scale(1); }
  }
  .rowheart {
    position: absolute; right: 16px; bottom: 8px; font-size: 14px; pointer-events: none; z-index: 2;
    will-change: transform, opacity;
    animation: floatUp 1.4s ease-out forwards;
  }
  @keyframes floatUp {
    0% { opacity: 0; transform: translate(0, 0) scale(.5); }
    15% { opacity: 1; }
    100% { opacity: 0; transform: translate(var(--dx, 0), -64px) scale(1.15); }
  }
  .list { display: flex; flex-direction: column; gap: 8px; }
  .item {
    display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 12px;
    background: rgba(255,255,255,.05); transition: background .3s, transform .3s;
    position: relative;
  }
  .item.liking { background: rgba(255,45,126,.18); }
  .item.enter { animation: pop .35s ease both; }
  .item.r1 { background: linear-gradient(90deg, rgba(255,196,0,.28), rgba(255,255,255,.04)); }
  .item.r2 { background: linear-gradient(90deg, rgba(190,200,220,.22), rgba(255,255,255,.04)); }
  .item.r3 { background: linear-gradient(90deg, rgba(205,127,50,.24), rgba(255,255,255,.04)); }
  .rank { width: 24px; text-align: center; font-weight: 800; font-size: 16px; flex: 0 0 auto; }
  .avatar { width: 36px; height: 36px; border-radius: 50%; flex: 0 0 auto; background: #333 center/cover no-repeat; border: 2px solid rgba(255,255,255,.2); }
  .name { flex: 1; font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .val { font-weight: 800; font-variant-numeric: tabular-nums; font-size: 15px; }
  .val .u { font-size: 12px; opacity: .7; margin-left: 2px; display: inline-block; transform-origin: center; }
  .val .u.beat { animation: beat .5s ease; }
  .empty { opacity: .6; font-size: 14px; padding: 10px 4px; }
  @keyframes pop { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
</style>
</head>
<body>
<div class="panel">
  <div class="head"><span class="ic" id="ic">❤️</span><span id="title">Top tap-tap</span></div>
  <div class="list" id="list"><div class="empty">Esperando actividad…</div></div>
</div>
<script src="/assets/tiklike.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const metric = (params.get('metric') === 'gifts') ? 'gifts' : 'likes';
  const N = Math.max(3, Math.min(10, parseInt(params.get('n') || '5', 10)));
  const fmt = (n) => new Intl.NumberFormat('es-MX').format(n || 0);

  const cfg = metric === 'gifts'
    ? { ic: '💎', title: 'Top regalos', unit: '💎', field: 'diamonds' }
    : { ic: '❤️', title: 'Top tap-tap', unit: '❤', field: 'likes' };
  document.getElementById('ic').textContent = cfg.ic;
  document.getElementById('title').textContent = cfg.title;

  const medals = ['🥇', '🥈', '🥉'];
  const listEl = document.getElementById('list');
  const rowEls = new Map(); // handle -> elemento, para reutilizar y no recrear

  function makeRow() {
    const el = document.createElement('div');
    el.className = 'item enter';
    el.innerHTML = `
      <div class="rank"></div>
      <div class="avatar"></div>
      <div class="name"></div>
      <div class="val"><span class="num"></span><span class="u">${cfg.unit}</span></div>`;
    return el;
  }

  function render(rows) {
    rows = (rows || []).slice(0, N);

    const empty = listEl.querySelector('.empty');
    if (rows.length && empty) empty.remove();
    if (!rows.length) {
      if (!listEl.querySelector('.empty')) listEl.innerHTML = '<div class="empty">Esperando actividad…</div>';
      return;
    }

    // FLIP (1/2): posición actual de cada fila ANTES de reordenar.
    const firstTop = new Map();
    for (const [h, el] of rowEls) firstTop.set(h, el.getBoundingClientRect().top);

    const seen = new Set();
    rows.forEach((r, i) => {
      seen.add(r.handle);
      let el = rowEls.get(r.handle);
      const isNew = !el;
      if (isNew) { el = makeRow(); rowEls.set(r.handle, el); }

      // clase de posición (con classList para NO pisar 'liking'/'beat')
      el.classList.remove('r1', 'r2', 'r3');
      if (i < 3) el.classList.add('r' + (i + 1));
      if (!isNew) el.classList.remove('enter');

      const rankEl = el.querySelector('.rank');
      const rankTxt = i < 3 ? medals[i] : String(i + 1);
      if (rankEl.textContent !== rankTxt) rankEl.textContent = rankTxt;

      const av = el.querySelector('.avatar');
      const pic = r.pic ? `url('${r.pic}')` : '';
      if (pic && av.style.backgroundImage !== pic) av.style.backgroundImage = pic;

      const nameEl = el.querySelector('.name');
      if (nameEl.textContent !== r.name) nameEl.textContent = r.name; // textContent = sin riesgo XSS

      const numEl = el.querySelector('.val .num');
      const valTxt = fmt(r[cfg.field]);
      if (numEl.dataset.v !== valTxt) { numEl.dataset.v = valTxt; numEl.textContent = valTxt; }

      // colocar en orden (appendChild reubica el nodo existente)
      listEl.appendChild(el);
    });

    // quitar los que ya no están en el top
    for (const [h, el] of rowEls) {
      if (!seen.has(h)) { el.remove(); rowEls.delete(h); }
    }

    // FLIP (2/2): anima la diferencia entre posición vieja y nueva.
    for (const [h, el] of rowEls) {
      const prev = firstTop.get(h);
      if (prev == null) continue; // fila nueva: usa su propia animación de entrada
      const delta = prev - el.getBoundingClientRect().top;
      if (!delta) continue;
      el.style.transition = 'none';
      el.style.transform = `translateY(${delta}px)`;
      requestAnimationFrame(() => {
        el.style.transition = 'transform .35s cubic-bezier(.2,.8,.2,1)';
        el.style.transform = '';
      });
    }
  }

  // ---- animación en la FILA del usuario que da tap-tap ----
  const HEART_EMOJIS = ['❤️', '💖', '💗', '💓', '🩷'];
  const FLOAT = metric === 'gifts' ? ['💎', '✨'] : HEART_EMOJIS;
  const rand = (arr) => arr[Math.floor(Math.random() * arr.length)];
  const cooldown = new Map(); // throttle de corazones por usuario

  function animateRow(handle) {
    const el = rowEls.get(handle);
    if (!el) return; // el usuario no está en el top visible

    // late el contador de esa fila
    const u = el.querySelector('.val .u');
    if (u) { u.classList.remove('beat'); void u.offsetWidth; u.classList.add('beat'); }

    // resalta la fila brevemente
    el.classList.add('liking');
    clearTimeout(el._likeT);
    el._likeT = setTimeout(() => el.classList.remove('liking'), 500);

    // sube un corazón desde esa fila (con throttle por usuario)
    const now = performance.now();
    if (now - (cooldown.get(handle) || 0) > 120 && el.querySelectorAll('.rowheart').length < 5) {
      cooldown.set(handle, now);
      const h = document.createElement('span');
      h.className = 'rowheart';
      h.textContent = rand(FLOAT);
      h.style.setProperty('--dx', (Math.random() * 24 - 12).toFixed(0) + 'px');
      el.appendChild(h); // absolute => no afecta el layout de la fila
      setTimeout(() => h.remove(), 1400);
    }
  }

  TikLike.connect((msg) => {
    if (msg.type === 'state' && msg.top) render(msg.top[metric]);
    else if (msg.type === 'like' && metric === 'likes') animateRow(msg.user.handle);
    else if (msg.type === 'gift' && !msg.streaking && metric === 'gifts') animateRow(msg.user.handle);
  });
</script>
</body>
</html>
